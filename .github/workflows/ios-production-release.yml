name: iOS Production Release

on:
  push:
    branches:
      - main
    paths:
      - "InhouseMakeriOS/**"
      - "InhouseMakeriOS.xcodeproj/**"
      - "fastlane/**"
      - "scripts/ios/**"
      - "Gemfile"
      - ".github/workflows/ios-production-release.yml"
  workflow_dispatch:

concurrency:
  group: ios-production-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    if: ${{ github.ref_name == 'main' }}
    runs-on: macos-latest
    environment: ios-production
    env:
      FASTLANE_SKIP_UPDATE_CHECK: "1"
      FASTLANE_DISABLE_COLORS: "1"
      IOS_FASTLANE_APP_IDENTIFIER: com.hwb.InhouseIOS
      IOS_GOOGLE_CLIENT_ID_PRODUCTION: ${{ secrets.IOS_GOOGLE_CLIENT_ID_PRODUCTION }}
      IOS_GOOGLE_REVERSED_CLIENT_ID_PRODUCTION: ${{ secrets.IOS_GOOGLE_REVERSED_CLIENT_ID_PRODUCTION }}
      IOS_DEVELOPMENT_TEAM: ${{ secrets.IOS_DEVELOPMENT_TEAM }}
      APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
      APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
      APP_STORE_CONNECT_API_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT }}
      BUILD_NUMBER_OVERRIDE: ${{ github.run_number }}
    steps:
      - name: Guard release branch
        run: |
          set -euo pipefail
          [[ "${GITHUB_REF_NAME}" == "main" ]]

      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"

      - name: Install Fastlane bundle
        run: bundle install --jobs 4 --retry 3

      - name: Validate release secrets
        run: bash scripts/ios/validate_release_env.sh production upload

      - name: Generate CI xcconfig
        id: xcconfig
        run: |
          set -euo pipefail
          path="$(bash scripts/ios/create_ci_xcconfig.sh production)"
          echo "path=${path}" >> "${GITHUB_OUTPUT}"

      - name: Upload production build to App Store Connect
        run: bundle exec fastlane release_production
        env:
          CI_XCCONFIG_PATH: ${{ steps.xcconfig.outputs.path }}

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-production-build
          path: build/ios/production
          if-no-files-found: ignore
